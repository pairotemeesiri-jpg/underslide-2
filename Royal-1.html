<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระราชกรณียกิจ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #fff1cc 0%, #f2d479 50%, #d4a017 100%);
            font-family: 'Sarabun', sans-serif;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff8dc;
            border: 3px solid #b8860b;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(134,102,23,0.25);
        }
        h1 {
            text-align: center;
            color: #866617;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .menu-item {
            display: block;
            padding: 1rem;
            margin: 0.8rem 0;
            background: #b8860b;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .menu-item:hover {
            background: #866617;
            transform: translateX(5px);
        }
        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: #866617;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .back-btn:hover {
            background: #6b5012;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>พระราชกรณียกิจ</h1>

        <a href="#" class="menu-item">ด้านการทหารและการบิน</a>
        <a href="#" class="menu-item">ด้านการกีฬา</a>
        <a href="#" class="menu-item">ด้านการศึกษา</a>
        <a href="#" class="menu-item">ด้านการศาสนา</a>
        <a href="#" class="menu-item">ด้านการเกษตรกรรม</a>
        <a href="#" class="menu-item">ด้านการแพทย์และสาธารณสุข</a>
        <a href="#" class="menu-item">ด้านความสัมพันธ์กับต่างประเทศ</a>
        <a href="#" class="menu-item">ด้านสังคมสงเคราะห์</a>

        <a href="underslide.html" class="back-btn">← กลับหน้าแรก</a>
    </div>
</body>
</html>
