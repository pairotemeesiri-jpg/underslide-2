<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรงพระเจริญ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #fff1cc 0%, #f2d479 50%, #d4a017 100%);
            font-family: 'Sarabun', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem 1rem; position: relative; overflow: hidden;
        }
        .bg-line { position: absolute; width: 600px; height: 600px; border-radius: 50%; border: 1px solid rgba(134,102,23,0.1); pointer-events: none; }
        .bg-line:nth-child(1) { top: -200px; left: -150px; }
        .bg-line:nth-child(2) { bottom: -200px; right: -150px; }

        .frame-box {
            width: 100%; max-width: 550px;
            padding: 12px; background: #fff8dc;
            border: 3px solid #b8860b; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(134,102,23,0.25);
            text-align: center;
        }
        .royal-image { width: 100%; height: auto; display: block; border-radius: 6px; }
        .title-text {
            margin-top: 2rem; font-size: 2.2rem; font-weight: 700;
            color: #866617; text-shadow: 1px 1px 3px rgba(134,102,23,0.2);
        }
        .link-btn {
            display: inline-block;
            margin-top: 1.8rem;
            padding: 0.8rem 2rem;
            background: #b8860b;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(134,102,23,0.2);
            cursor: pointer;
        }
        .link-btn:hover {
            background: #866617;
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .title-text { font-size: 1.7rem; }
            .frame-box { max-width: 95%; }
            .link-btn { font-size: 1rem; padding: 0.7rem 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-line"></div>
    <div class="bg-line"></div>

    <div class="frame-box">
        <img src="profile10-2.png" alt="พระบรมฉายาลักษณ์" class="royal-image">
    </div>
    <h1 class="title-text">ทรงพระเจริญ</h1>

    <!-- ✅ ลิงก์ตรงกับโฟลเดอร์จริงใน GitHub 100% -->
    <a href="Royal-1.html" class="link-btn" target="_self" rel="noopener noreferrer">
        พระราชกรณียกิจ
    </a>
</body>
</html>
